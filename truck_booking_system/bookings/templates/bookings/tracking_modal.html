<div class="modal fade" id="trackingModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-0">
        <h5 class="modal-title">
          <i class="bi bi-geo-alt me-2"></i>Live Tracking - Booking #<span id="tracking-booking-id"></span>
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div id="tracking-map" class="w-100"></div>
        <div class="p-3 border-top">
          <div class="row">
            <div class="col-md-3">
              <strong>ETA:</strong> <span id="eta-display">-- min</span>
            </div>
            <div class="col-md-3">
              <strong>Distance:</strong> <span id="distance-display">-- km</span>
            </div>
            <div class="col-md-3">
              <strong>Status:</strong> <span id="truck-status">Online</span>
            </div>
            <div class="col-md-3 text-end">
              <small>Last update: <span id="last-update">--</span></small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'js/tracking.js' %}"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
