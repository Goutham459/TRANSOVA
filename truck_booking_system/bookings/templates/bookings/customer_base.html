{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TRANSOVA - Customer{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Theme CSS -->
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    
    <style>
        .customer-navbar {
            background: rgba(11, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(6, 182, 212, 0.1);
            padding: 12px 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #06b6d4, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        
        .nav-link {
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: #fff !important;
        }
        
        .nav-link:hover { background: rgba(6, 182, 212, 0.1); }
        .nav-link.active { color: #06b6d4 !important; }
        
        .dropdown-menu {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(6, 182, 212, 0.3);
        }
        
        .dropdown-item {
            color: #fff;
        }
        
        .dropdown-item:hover {
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }
        
        .customer-container {
            padding-top: 80px;
            min-height: 100vh;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- CUSTOMER NAVBAR -->
<nav class="navbar navbar-expand-lg customer-navbar fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-truck"></i> TRANSOVA
        </a>

        <button class="navbar-toggler text-white border-0" data-bs-toggle="collapse" data-bs-target="#nav">
            <i class="bi bi-list fs-4"></i>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/trucks/' in request.path %}active{% endif %}" href="/trucks/">Trucks</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/faq/' in request.path %}active{% endif %}" href="/faq/">FAQ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'customer-dashboard' in request.path %}active{% endif %}" href="/bookings/customer-dashboard/">Dashboard</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> {{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
<li><a class="dropdown-item" href="/accounts/customer-profile/"><i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><a class="dropdown-item" href="/bookings/my-bookings/"><i class="bi bi-calendar-check me-2"></i>My Bookings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="/logout/"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- PAGE CONTENT -->
<main class="customer-container">
    {% block content %}{% endblock %}
</main>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/theme.js' %}"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
