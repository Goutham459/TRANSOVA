{% extends "bookings/admin_base.html" %}

{% block title %}Add Truck - Transova Admin{% endblock %}
{% block page_title %}Add New Truck{% endblock %}

{% block admin_content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="admin-card">
            <div class="card-header">
                <h5><i class="bi bi-truck me-2"></i>Add New Truck</h5>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Truck Number *</label>
                        <input type="text" name="truck_number" class="form-control" required placeholder="e.g., TRK-001">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Truck Type *</label>
                        <select name="truck_type" class="form-select" required>
                            {% for type_code, type_name in truck_types %}
                                <option value="{{ type_code }}">{{ type_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Capacity (kg) *</label>
                        <input type="number" name="capacity" class="form-control" required placeholder="e.g., 5000">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price per KM ($) *</label>
                        <input type="number" step="0.01" name="price_per_km" class="form-control" required placeholder="e.g., 2.50">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Company</label>
                        <select name="company" class="form-select">
                            <option value="">-- No Company (Admin owned) --</option>
                            {% for company in companies %}
                                <option value="{{ company.id }}">{{ company.company_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Truck Image</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_available" class="form-check-input" id="is_available" checked>
                        <label class="form-check-label" for="is_available">
                            Available for Booking
                        </label>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-admin">
                            <i class="bi bi-check-circle me-1"></i> Add Truck
                        </button>
                        <a href="{% url 'admin_trucks' %}" class="btn btn-admin-outline">
                            <i class="bi bi-x-circle me-1"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
