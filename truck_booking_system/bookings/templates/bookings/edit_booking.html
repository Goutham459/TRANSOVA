{% extends "bookings/base.html" %}

{% block title %}Edit Booking{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow">
            <div class="card-header text-center bg-warning text-dark">
                <h4>Edit Booking</h4>
            </div>

            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Customer Name</label>
                        <input type="text" name="customer_name" class="form-control" value="{{ booking.customer_name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Pickup Location</label>
                        <input type="text" name="pickup_location" class="form-control" value="{{ booking.pickup_location }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Drop Location</label>
                        <input type="text" name="drop_location" class="form-control" value="{{ booking.drop_location }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Booking Date</label>
                        <input type="date" name="booking_date" class="form-control" value="{{ booking.booking_date }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Distance (km)</label>
                        <input type="number" step="0.1" name="distance_km" class="form-control" value="{{ booking.distance_km }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Select Truck</label>
                        <select name="truck" class="form-select" required>
                            <option value="">-- Select a Truck --</option>
                            {% for truck in trucks %}
                                <option value="{{ truck.id }}" {% if booking.truck and truck.id == booking.truck.id %}selected{% endif %}>
                                    {{ truck.truck_number }} ({{ truck.truck_type }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Load Type</label>
                        <select name="load_type" class="form-select" required>
                            <option value="">-- Select Load Type --</option>
                            {% for load in load_types %}
                                <option value="{{ load.id }}" {% if booking.load_type and load.id == booking.load_type.id %}selected{% endif %}>
                                    {{ load.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">Update Booking</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
