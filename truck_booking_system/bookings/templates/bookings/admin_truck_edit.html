{% extends "bookings/admin_base.html" %}

{% block title %}Edit Truck - Transova Admin{% endblock %}
{% block page_title %}Edit Truck{% endblock %}

{% block admin_content %}
<div class="row">
    <div class="col-md-6">
        <div class="admin-card">
            <div class="card-header">
                <h5><i class="bi bi-truck me-2"></i>Edit Truck</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Truck Number</label>
                        <input type="text" name="truck_number" class="form-control" value="{{ truck.truck_number }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Truck Type</label>
                        <input type="text" name="truck_type" class="form-control" value="{{ truck.truck_type }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Capacity (kg)</label>
                        <input type="number" name="capacity" step="0.01" class="form-control" value="{{ truck.capacity }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price per KM</label>
                        <input type="number" name="price_per_km" step="0.01" class="form-control" value="{{ truck.price_per_km }}" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_available" class="form-check-input" id="is_available" {% if truck.is_available %}checked{% endif %}>
                        <label class="form-check-label" for="is_available">Available</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-admin btn-admin-primary">
                            <i class="bi bi-check-circle me-1"></i> Save
                        </button>
                        <a href="{% url 'admin_trucks' %}" class="btn btn-admin btn-admin-outline">
                            <i class="bi bi-x-circle me-1"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
