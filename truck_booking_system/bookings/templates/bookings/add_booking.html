{% extends "bookings/base.html" %}
{% load static %}

{% block title %}
Add Booking | TRANSOVA
{% endblock %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow" style="background: rgba(255,255,255,0.04); border-radius: 16px;">
                <div class="card-header bg-primary text-white" style="background: linear-gradient(135deg, #4f46e5, #06b6d4) !important; border-radius: 16px 16px 0 0 !important;">
                    <h4 class="mb-0">Create New Booking</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label text-white">Customer Name</label>
                            <input type="text" class="form-control minimal-select" name="customer_name" placeholder="Enter customer name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Pickup Location</label>
                            <input type="text" class="form-control minimal-select" name="pickup_location" placeholder="Enter pickup location" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Drop Location</label>
                            <input type="text" class="form-control minimal-select" name="drop_location" placeholder="Enter drop location" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Booking Date</label>
                            <input type="date" class="form-control minimal-select" name="booking_date" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Distance (km)</label>
                            <input type="number" step="0.1" class="form-control minimal-select" name="distance_km" placeholder="Enter distance in km" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Select Truck</label>
                            <select class="form-select minimal-select" name="truck" required>
                                <option value="">Select a Truck</option>
                                {% for truck in trucks %}
                                <option value="{{ truck.id }}">{{ truck.truck_number }} - {{ truck.get_truck_type_display }} ({{ truck.capacity }} tons)</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Load Type</label>
                            <select class="form-select minimal-select" name="load_type" required>
                                <option value="">Select Load Type</option>
                                {% for load in load_types %}
                                <option value="{{ load.id }}">{{ load.name }} (x{{ load.price_multiplier }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn kontrek-btn">Create Booking</button>
                            <a href="{% url 'booking_list' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
