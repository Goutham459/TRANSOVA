{% extends "bookings/base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 450px;">
    <h2 class="mb-3">Verify your email</h2>
    <p>Enter the OTP sent to <strong>{{ email }}</strong></p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{ email }}">
        <div class="mb-3">
            <label for="otp" class="form-label">OTP</label>
            <input type="text" class="form-control" id="otp" name="otp" required>
        </div>
        <button type="submit" class="btn kontrek-btn w-100">Verify</button>
    </form>
    
    <div class="text-center mt-3">
        <p class="mb-2">Didn't receive the OTP?</p>
        <a href="{% url 'resend_otp' %}" class="btn btn-outline-secondary btn-sm">Resend OTP</a>
    </div>
</div>
{% endblock %}
