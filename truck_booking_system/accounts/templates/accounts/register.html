{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Transova</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body>

{% include "bookings/base.html" %}

<div class="container min-vh-100 d-flex align-items-center justify-content-center pt-5">
    <div class="login-card p-4 rounded-4 shadow-lg"
         style="max-width:420px;width:100%;background:rgba(255,255,255,0.04);">

        <h3 class="text-center mb-4 fw-bold">
            Create <span class="text-info">Account</span>
        </h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger small">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control minimal-select" required>
            </div>

            <div class="mb-3">
                <label class="form-label">mail ID</label>
                <input type="email" name="email" class="form-control minimal-select"
                       placeholder="example@gmail.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control minimal-select" required>
            </div>
            <div class="mb-2">
             <small id="strengthText" class="text-muted">Password strength</small>
             <div class="progress" style="height:6px">
                    <div id="strengthBar" class="progress-bar"></div>
                    </div>
                </div>

            <button class="btn kontrek-btn w-100 mt-3">Register</button>

            <div class="text-center mt-3">
                <small>
                    Already have an account?
                    <a href="{% url 'login' %}" class="text-info">Login</a>
                </small>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const passwordInput = document.querySelector("input[name='password']");
const bar = document.getElementById("strengthBar");
const text = document.getElementById("strengthText");

passwordInput.addEventListener("input", () => {
    const val = passwordInput.value;
    let score = 0;

    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = ["Weak", "Fair", "Good", "Strong"];
    const colors = ["bg-danger", "bg-warning", "bg-info", "bg-success"];

    bar.className = "progress-bar " + (colors[score-1] || "bg-danger");
    bar.style.width = `${(score / 4) * 100}%`;
    text.textContent = levels[score-1] || "Very Weak";
});
</script>
</body>
</html>
