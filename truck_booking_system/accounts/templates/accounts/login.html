{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Transova</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body>

{% include "bookings/base.html" %}

<div class="container min-vh-100 d-flex align-items-center justify-content-center pt-5">
    <div class="login-card p-4 rounded-4 shadow-lg"
         style="max-width:420px;width:100%;background:rgba(255,255,255,0.04);">

        <h3 class="text-center mb-4 fw-bold">
            Login to <span class="text-info">Transova</span>
        </h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger small">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control minimal-select" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control minimal-select" required>
            </div>

            <button class="btn kontrek-btn w-100 mt-3">Login</button>
            <hr class="my-3">

<a href="/accounts/google/login/" class="btn w-100 kontrek-btn-outline d-flex align-items-center justify-content-center">
    <img src="https://developers.google.com/identity/images/g-logo.png"
         style="width:18px" class="me-2">
    Continue with Google
</a>

            <div class="text-center mt-3">
                <a href="{% url 'forgot_password' %}" class="text-info small">Forgot Password?</a>
            </div>

            <div class="text-center mt-2">
                <small>
                    Don’t have an account?
                    <a href="{% url 'register' %}" class="text-info">Register</a>
                </small>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
