{% extends "bookings/base.html" %}
{% load static %}

{% block title %}
Add Driver | TRANSOVA
{% endblock %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow" style="background: rgba(255,255,255,0.04); border-radius: 16px;">
                <div class="card-header bg-primary text-white" style="background: linear-gradient(135deg, #4f46e5, #06b6d4) !important; border-radius: 16px 16px 0 0 !important;">
                    <h4 class="mb-0"><i class="bi bi-person-plus me-2"></i>Add New Driver</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-white">First Name</label>
                                <input type="text" class="form-control minimal-select" name="first_name" placeholder="First Name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-white">Last Name</label>
                                <input type="text" class="form-control minimal-select" name="last_name" placeholder="Last Name">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Username</label>
                            <input type="text" class="form-control minimal-select" name="username" placeholder="Enter username" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Email</label>
                            <input type="email" class="form-control minimal-select" name="email" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">Password</label>
                            <input type="password" class="form-control minimal-select" name="password" placeholder="Enter password" required>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn kontrek-btn">
                                <i class="bi bi-person-plus me-2"></i>Add Driver
                            </button>
                            <a href="{% url 'company_dashboard' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
